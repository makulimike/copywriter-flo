# render.yaml
services:
  - type: web
    name: copywriterflo
    runtime: python
    repo: https://github.com/YOUR_USERNAME/copywriter-acquisition
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WTF_CSRF_SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: CAMPAIGN_PRICE_AMOUNT
        value: 28000
      - key: CURRENCY
        value: usd
      - key: APP_URL
        fromService:
          name: copywriterflo
          type: web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: copywriterflo-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: copywriterflo-db
    databaseName: copywriterflo
    user: copywriter_user
    plan: free