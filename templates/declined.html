<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Declined - First Client Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background:
              radial-gradient(ellipse 900px 500px at 15% -10%, rgba(94,179,246,0.14), transparent 60%),
              #07090f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #eceef4;
        }
        .card {
            background: #11141f;
            border: 1px solid #232840;
            border-radius: 20px;
            padding: 44px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);
        }
        .decline { font-size: 52px; margin-bottom: 18px; }
        h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; margin-bottom: 14px; letter-spacing: -0.01em; }
        p { color: #8890a6; font-size: 14.5px; line-height: 1.7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="decline">😔</div>
        <h1>Meeting Declined</h1>
        <p>No problem! If you change your mind, feel free to reply to the email.</p>
        <p>Have a great day!</p>
    </div>
</body>
</html>
