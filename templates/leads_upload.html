{% extends "base.html" %}

{% block content %}
<div class="container">
  <div style="margin-bottom: 32px;">
    <h1 style="font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;">Add Leads to "{{ campaign.name }}"</h1>
    <p style="color: var(--muted);">Upload a CSV file or add leads manually.</p>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
    <!-- CSV Upload -->
    <div class="card">
      <h3 style="font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 16px;"> Upload CSV File</h3>
      <p class="text-muted" style="margin-bottom: 16px; font-size: 14px;">CSV should have columns: name, email, company, website, phone</p>
      <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="file" name="csv_file" accept=".csv" required style="margin-bottom: 16px;">
        <button type="submit" class="btn btn-primary">Upload & Process</button>
      </form>
      <div style="margin-top: 16px;">
        <a href="{{ url_for('download_csv_template') }}" style="color: var(--accent); font-size: 13px;"> Download CSV Template</a>
      </div>
    </div>

    <!-- Manual Entry -->
    <div class="card">
      <h3 style="font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 16px;"> Add Manually</h3>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" name="company">
        </div>
        <div class="form-group">
          <label>Website</label>
          <input type="url" name="website">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone">
        </div>
        <button type="submit" class="btn btn-primary">Add Lead</button>
      </form>
    </div>
  </div>

  <div style="margin-top: 32px; text-align: center;">
    <a href="{{ url_for('campaign_detail', campaign_id=campaign.id) }}" class="btn btn-secondary"> Back to Campaign</a>
  </div>
</div>
{% endblock %}
