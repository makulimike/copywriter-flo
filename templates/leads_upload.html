{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="page-head">
    <h1>Add Leads to "{{ campaign.name }}"</h1>
    <p>Upload a CSV file or add leads manually.</p>
  </div>

  <div class="grid-2">
    <!-- CSV Upload -->
    <div class="card">
      <h3 style="font-family: var(--font-display); font-size: 17px; font-weight: 700; margin-bottom: 16px;">📄 Upload CSV File</h3>
      <p class="text-muted mb-2" style="font-size: 13.5px;">CSV should have columns: name, email, company, website, phone</p>
      <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="file" name="csv_file" accept=".csv" required style="margin-bottom: 16px;">
        <button type="submit" class="btn btn-primary">Upload &amp; Process</button>
      </form>
      <div class="mt-2">
        <a href="{{ url_for('download_csv_template') }}" style="color: var(--accent); font-size: 13px; text-decoration: none; font-weight: 600;">↓ Download CSV Template</a>
      </div>
    </div>

    <!-- Manual Entry -->
    <div class="card">
      <h3 style="font-family: var(--font-display); font-size: 17px; font-weight: 700; margin-bottom: 16px;">✍️ Add Manually</h3>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" name="company">
        </div>
        <div class="form-group">
          <label>Website</label>
          <input type="url" name="website">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone">
        </div>
        <button type="submit" class="btn btn-primary">Add Lead</button>
      </form>
    </div>
  </div>

  <div style="margin-top: 32px; text-align: center;">
    <a href="{{ url_for('campaign_detail', campaign_id=campaign.id) }}" class="btn btn-secondary">← Back to Campaign</a>
  </div>
</div>
{% endblock %}
