{% extends "base.html" %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 24px;">
  <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;">
    <div style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--accent); text-align: center; margin-bottom: 4px;">Copywriterflo</div>
    <h1 style="font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px;">Welcome back</h1>
    <p style="color: var(--muted); text-align: center; font-size: 14px; margin-bottom: 32px;">Sign in to your account</p>
    
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In </button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted);">
      Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent);">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
