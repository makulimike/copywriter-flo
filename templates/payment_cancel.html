{% extends "base.html" %}

{% block content %}
<div class="container" style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
  <div class="card" style="text-align: center; max-width: 500px; margin: 0 auto;">
    <div style="font-size: 64px; margin-bottom: 16px;">😔</div>
    <h1 style="font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 16px;">Payment Cancelled</h1>
    <p style="color: var(--muted); margin-bottom: 24px;">Your payment was cancelled. No charges were made.</p>
    <div class="flex gap-2" style="justify-content: center;">
      <a href="{{ url_for('pricing') }}" class="btn btn-primary">Try Again</a>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Go to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
