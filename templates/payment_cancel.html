{% extends "base.html" %}

{% block content %}
<div class="container" style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
  <div class="card" style="text-align: center; max-width: 460px; margin: 0 auto;">
    <div style="font-size: 56px; margin-bottom: 12px;">😔</div>
    <h1 style="font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 12px;">Payment Cancelled</h1>
    <p class="text-muted mb-3">Your crypto payment was cancelled. No charges were made.</p>
    <div class="flex gap-2" style="justify-content: center;">
      <a href="{{ url_for('pricing') }}" class="btn btn-primary">Try Again</a>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Go to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
