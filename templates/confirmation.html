<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Confirmed - First Client Engine</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 16px; }
        .meeting-link {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }
        .checkmark {
            font-size: 64px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">✓</div>
        <h1>Meeting Confirmed!</h1>
        <p>Your meeting has been scheduled for <strong>{{ meeting_time.strftime('%B %d, %Y at %I:%M %p') }}</strong></p>
        <div class="meeting-link">
            <strong>Google Meet Link:</strong><br>
            <a href="{{ meeting_link }}" target="_blank">{{ meeting_link }}</a>
        </div>
        <p>Please save this link and add the meeting to your calendar.</p>
        <a href="{{ meeting_link }}" class="btn" target="_blank">Join Meeting</a>
        <p style="margin-top: 20px; font-size: 12px; color: #999;">You can also add this to Google Calendar</p>
    </div>
</body>
</html>
